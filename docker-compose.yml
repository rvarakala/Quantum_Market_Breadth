version: '3.8'

services:
  # Main FastAPI Application
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/quantum_breadth
      - REDIS_URL=redis://redis:6379
      - TWELVEDATA_API_KEY=${TWELVEDATA_API_KEY}
    depends_on:
      - db
      - redis
    volumes:
      - ./data:/app/data
      - ./notebooks:/app/notebooks
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=quantum_breadth
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Jupyter Notebook (for development)
  notebook:
    build: .
    command: jupyter lab --ip=0.0.0.0 --port=8888 --no-browser --allow-root
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/app/notebooks
      - ./data:/app/data
      - ./src:/app/src
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/quantum_breadth
      - REDIS_URL=redis://redis:6379
      - TWELVEDATA_API_KEY=${TWELVEDATA_API_KEY}
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  redis_data:
